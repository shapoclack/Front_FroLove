<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth — Task 8 (JWT)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0d1117;
            color: #c9d1d9;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(22, 78, 99, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(30, 58, 138, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(15, 118, 110, 0.2) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-5%, 3%) rotate(3deg);
            }
        }

        /* Nav */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0ea5e9, #14b8a6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .nav-user {
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #8b949e;
        }

        .nav-user.visible {
            display: flex;
        }

        .nav-user span {
            color: #38bdf8;
            font-weight: 500;
        }

        .btn-logout {
            padding: 6px 14px;
            border: 1px solid rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Screens */
        .screen {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding-top: 56px;
        }

        .screen.active {
            display: flex;
        }

        /* Auth screen */
        #authScreen {
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4, #14b8a6);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 13px;
            color: #8b949e;
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(13, 17, 23, 0.6);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #8b949e;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .tab.active {
            background: rgba(14, 165, 233, 0.15);
            color: #38bdf8;
        }

        .tab:hover:not(.active) {
            color: #c9d1d9;
            background: rgba(255, 255, 255, 0.04);
        }

        /* Forms */
        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 10px;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .form-group input::placeholder {
            color: #484f58;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }

        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Dashboard */
        #dashScreen {
            flex-direction: column;
            padding: 80px 24px 24px;
        }

        .dash-header {
            margin-bottom: 24px;
        }

        .dash-header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dash-header p {
            color: #8b949e;
            font-size: 14px;
            margin-top: 4px;
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .info-card {
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 14px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .info-card h3 {
            font-size: 14px;
            color: #8b949e;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-card .value {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
            word-break: break-all;
        }

        .info-card .value.token {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #7ee787;
            max-height: 60px;
            overflow-y: auto;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        /* Products section */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }

        .product-card {
            background: rgba(22, 27, 34, 0.75);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.2s;
        }

        .product-card:hover {
            border-color: rgba(14, 165, 233, 0.3);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .product-card h4 {
            color: #e2e8f0;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .product-card .cat {
            color: #38bdf8;
            font-size: 12px;
            font-weight: 500;
        }

        .product-card .desc {
            color: #8b949e;
            font-size: 13px;
            margin: 8px 0;
        }

        .product-card .price {
            color: #34d399;
            font-size: 16px;
            font-weight: 700;
        }

        .empty-msg {
            color: #484f58;
            font-size: 14px;
            text-align: center;
            padding: 30px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 68px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 360px;
        }

        .toast.success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.fade-out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-brand-icon">🔑</div>
            Task 8 — JWT Auth
        </div>
        <div class="nav-user" id="navUser">
            <span id="navEmail"></span>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </nav>

    <!-- Auth Screen -->
    <div class="screen active" id="authScreen">
        <div class="auth-container">
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">🔑</div>
                    <h1>Task 8 — JWT Auth</h1>
                    <p>Авторизация с JSON Web Token</p>
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">Вход</button>
                    <button class="tab" onclick="switchTab('register')">Регистрация</button>
                </div>

                <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="ivan@mail.ru" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-text">Войти</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <form class="form" id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="ivan@mail.ru" required>
                    </div>
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regFirstName" placeholder="Иван" required>
                    </div>
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="regLastName" placeholder="Иванов" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-text">Зарегистрироваться</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div class="screen" id="dashScreen">
        <div class="dash-header fade-in">
            <h2>👋 Добро пожаловать!</h2>
            <p>Вы авторизованы через JWT-токен</p>
        </div>

        <div class="info-cards fade-in">
            <div class="info-card">
                <h3>Статус</h3>
                <div class="value"><span class="badge badge-green">Авторизован</span></div>
            </div>
            <div class="info-card">
                <h3>Email</h3>
                <div class="value" id="dashEmail">—</div>
            </div>
            <div class="info-card">
                <h3>Имя</h3>
                <div class="value" id="dashName">—</div>
            </div>
            <div class="info-card">
                <h3>JWT Token</h3>
                <div class="value token" id="dashToken">—</div>
            </div>
        </div>

        <div class="section-title">📦 Товары (защищённые роуты)</div>
        <div class="product-grid" id="productGrid">
            <div class="empty-msg">Нет товаров. Добавьте через API.</div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let jwtToken = null;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
        }

        function showToast(message, type = 'success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = message;
            c.appendChild(t);
            setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        function setLoading(btn, loading) {
            btn.classList.toggle('loading', loading);
            btn.disabled = loading;
        }

        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screen).classList.add('active');
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            setLoading(btn, true);
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('regEmail').value,
                        first_name: document.getElementById('regFirstName').value,
                        last_name: document.getElementById('regLastName').value,
                        password: document.getElementById('regPassword').value,
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Регистрация успешна! Теперь войдите.');
                    switchTab('login');
                } else {
                    showToast(data.error || 'Ошибка', 'error');
                }
            } catch { showToast('Ошибка сети', 'error'); }
            finally { setLoading(btn, false); }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            setLoading(btn, true);
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value,
                    })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    jwtToken = data.token;
                    showToast('Добро пожаловать!');
                    await loadDashboard();
                } else {
                    showToast(data.error || 'Неверные данные', 'error');
                }
            } catch { showToast('Ошибка сети', 'error'); }
            finally { setLoading(btn, false); }
        }

        async function loadDashboard() {
            // Get user info
            try {
                const res = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const user = await res.json();
                document.getElementById('dashEmail').textContent = user.email;
                document.getElementById('dashName').textContent = `${user.first_name} ${user.last_name}`;
                document.getElementById('navEmail').textContent = user.email;
                document.getElementById('navUser').classList.add('visible');
                document.getElementById('dashToken').textContent = jwtToken;
            } catch { }

            // Load products
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                renderProducts(products);
            } catch { }

            showScreen('dashScreen');
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-msg">Нет товаров. Добавьте через Swagger API (/api-docs).</div>';
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card fade-in">
                    <div class="cat">${p.category}</div>
                    <h4>${p.title}</h4>
                    <div class="desc">${p.description}</div>
                    <div class="price">${p.price} ₽</div>
                </div>
            `).join('');
        }

        function logout() {
            jwtToken = null;
            document.getElementById('navUser').classList.remove('visible');
            showScreen('authScreen');
            showToast('Вы вышли из аккаунта');
        }
    </script>
</body>

</html>
