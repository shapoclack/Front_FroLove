<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth — Task 7</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(22, 78, 99, 0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(30, 58, 138, 0.25) 0%, transparent 50%),
                        radial-gradient(ellipse at 60% 80%, rgba(15, 118, 110, 0.2) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, 3%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(56, 68, 77, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(56, 68, 77, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4, #14b8a6);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 13px;
            color: #8b949e;
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(13, 17, 23, 0.6);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #8b949e;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .tab.active {
            background: rgba(14, 165, 233, 0.15);
            color: #38bdf8;
            box-shadow: 0 0 12px rgba(14, 165, 233, 0.1);
        }

        .tab:hover:not(.active) {
            color: #c9d1d9;
            background: rgba(255, 255, 255, 0.04);
        }

        /* Forms */
        .form { display: none; }
        .form.active { display: block; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 10px;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15),
                        0 0 12px rgba(14, 165, 233, 0.1);
        }

        .form-group input::placeholder {
            color: #484f58;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 360px;
        }

        .toast.success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.fade-out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateX(40px); }
        }

        /* Result panel */
        .result {
            margin-top: 20px;
            padding: 14px 16px;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Consolas', 'Courier New', monospace;
            color: #7ee787;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .result.visible { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading spinner */
        .btn .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <h1>Task 7 — Auth</h1>
                <p>Регистрация и авторизация (bcrypt)</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <!-- Login Form -->
            <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="ivan@mail.ru" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">Войти</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <!-- Register Form -->
            <form class="form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="ivan@mail.ru" required>
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="regFirstName" placeholder="Иван" required>
                </div>
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" id="regLastName" placeholder="Иванов" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">Зарегистрироваться</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="result" id="resultBox"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('resultBox').classList.remove('visible');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('fade-out'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showResult(data) {
            const box = document.getElementById('resultBox');
            box.textContent = JSON.stringify(data, null, 2);
            box.classList.add('visible');
        }

        function setLoading(btn, loading) {
            btn.classList.toggle('loading', loading);
            btn.disabled = loading;
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('regEmail').value,
                        first_name: document.getElementById('regFirstName').value,
                        last_name: document.getElementById('regLastName').value,
                        password: document.getElementById('regPassword').value,
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Регистрация успешна!');
                    showResult(data);
                } else {
                    showToast(data.error || 'Ошибка', 'error');
                }
            } catch (err) {
                showToast('Ошибка сети', 'error');
            } finally {
                setLoading(btn, false);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value,
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Авторизация успешна!');
                    showResult(data);
                } else {
                    showToast(data.error || 'Ошибка', 'error');
                }
            } catch (err) {
                showToast('Ошибка сети', 'error');
            } finally {
                setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
